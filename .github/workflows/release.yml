name: Release UniFlashTool
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents:
    write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
# Fully vibe-coded, I know nothing about GitHub actions fam 🥀

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          dir: ${{ github.workspace }}/Qt
          cache: false
          host: ${{ matrix.os == 'windows-latest' && 'windows' || (matrix.os == 'macos-latest' && 'mac' || 'linux') }}
          target: 'desktop'
      
      - name: Set up MSVC dev cmd
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # MacOS only action:
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install curlpp curl libarchive
          echo "LibArchive_ROOT=$(brew --prefix libarchive)" >> $GITHUB_ENV

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev libcurl4-openssl-dev libfuse2 libxcb-cursor0 libnss3 libdbus-1-3 || true
      
      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libarchive:x64-windows curl:x64-windows

      - name: Build UniFlashTool
        shell: bash
        run: |
          CMAKE_FLAGS=""
          if [ "${{ runner.os }}" == "Windows" ]; then
            CMAKE_FLAGS="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            CMAKE_FLAGS="-DLibArchive_ROOT=$(brew --prefix libarchive)"
          fi
          
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release $CMAKE_FLAGS
          cmake --build build --config Release

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/uniflashtool.app -dmg
          mv build/uniflashtool.dmg UniFlashTool-MacOS.dmg

      - name: Package Windows (Zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "build/Release/translations") { Remove-Item -Recurse -Force "build/Release/translations" }
          $env:VCINSTALLDIR = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC"
          cd build/Release
          & "D:\a\UniFlashTool\UniFlashTool\Qt\Qt\6.5.0\msvc2019_64\bin\windeployqt.exe" `
            --qmldir ../.. `
            --plugindir ./plugins `
            --no-compiler-runtime `
            uniflashtool.exe
          cd ../..
          Compress-Archive -Path build/Release/* -DestinationPath UniFlashTool-Windows.zip

      - name: Package Linux (Tarball)
        if: runner.os == 'Linux'
        run: |
          wget -c https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          mkdir -p dist/usr/bin
          mkdir -p dist/usr/share/applications/
          mkdir -p dist/usr/share/icons/hicolor/256x256/apps/
          cp build/uniflashtool dist/usr/bin/
          cp uniflashtool.desktop dist/
          cp uniflashtool.png dist/
          export VERSION=${{ github.ref_name }}
          ./linuxdeployqt-continuous-x86_64.AppImage dist/usr/bin/uniflashtool -appimage -always-overwrite -unsupported-allow-new-glibc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: binary-${{ matrix.os }}
          path: |
            UniFlashTool-Windows.zip
            uniflashtool-*.AppImage
            UniFlashTool-MacOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/UniFlashTool-Windows.zip
            ./artifacts/uniflashtool-*.AppImage
            ./artifacts/UniFlashTool-MacOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}