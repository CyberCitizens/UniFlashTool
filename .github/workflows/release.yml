name: Release UniFlashTool
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
# Fully vibe-coded, I know nothing about GitHub actions fam 🥀

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          dir: ${{ github.workspace }}/Qt
          cached: false
          host: ${{ matrix.os == 'windows-latest' && 'windows' || 'linux' }}
          target: 'desktop'

      # MacOS only action:
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install curlpp curl libarchive

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev libcurl4-openssl-dev libfuse2

      - name: Build UniFlashTool
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/UniFlashTool.app -dmg
          mv build/UniFlashTool.dmg UniFlashTool-MacOS.dmg

      - name: Package Windows (Zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          windeployqt build/Release/UniFlashTool.exe
          Compress-Archive -Path build/Release/* -DestinationPath UniFlashTool-Windows.zip

      - name: Package Linux (Tarball)
        if: runner.os == 'Linux'
        run: |
          wget -c https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          mkdir -p dist/usr/bin
          cp build/uniflashtool dist/usr/bin/
          cp uniflashtool.desktop dist/usr/share/applications/
          cp uniflashtool.png dist/usr/share/icons/hicolor/256x256/apps/
          export VERSION=${{ github.ref_name }}
          ./linuxdeployqt-continuous-x86_64.AppImage dist/usr/bin/uniflashtool -appimage -always-overwrite -unsupported-allow-new-glibc

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            UniFlashTool-Windows.zip
            uniflashtool-*.AppImage
            UniFlashTool-MacOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}